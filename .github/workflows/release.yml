name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Test
        run: zig build test

      - name: Build binaries
        run: |
          mkdir -p dist
          zig build -Dtarget=x86_64-linux-musl -Doptimize=ReleaseFast
          cp zig-out/bin/tenun dist/tenun-linux-x86_64
          zig build -Dtarget=aarch64-linux-musl -Doptimize=ReleaseFast
          cp zig-out/bin/tenun dist/tenun-linux-aarch64
          zig build -Dtarget=x86_64-windows-gnu -Doptimize=ReleaseFast
          cp zig-out/bin/tenun.exe dist/tenun-windows-x86_64.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.${{ github.run_number }}
          name: Tenun v0.0.${{ github.run_number }}
          files: dist/*
          generate_release_notes: true
